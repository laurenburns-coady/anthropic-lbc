<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>lauren burns coady</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Times New Roman', serif;
      background: black;
      width: 100%;
      height: 100%;
    }

    .name {
      position: relative;
      z-index: 2;
      color: white;
      font-weight: bold;
      font-size: 10vw;
      text-align: center;
      white-space: nowrap;
      width: 100%;
      margin-top: 25vh;
      text-transform: lowercase;
      font-family: 'Times New Roman', serif;
    }

    .subtitle {
      position: relative;
      z-index: 2;
      color: white;
      font-size: 4vw;
      text-align: center;
      width: 100%;
      margin-top: 1vh;
      text-transform: lowercase;
      font-family: 'Times New Roman', serif;
    }

    .links {
      position: relative;
      z-index: 2;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2vh 5vw;
      margin-top: 4vh;
      padding: 0 5vw;
      font-size: 5vw;
      font-weight: bold;
      text-transform: lowercase;
      font-family: 'Times New Roman', serif;
    }

    .links a {
      color: white;
      text-decoration: none;
      white-space: nowrap;
      transition: color 0.2s ease;
    }

    .links a:hover {
      color: limegreen;
    }
  </style>
</head>
<body>

  <div class="name">lauren burns coady</div>
  <div class="subtitle">application: analyst, anthropic institute</div>

  <div class="links">
    <a href="LBC_Anthropic_Letter.pdf" target="_blank">letter</a>
    <a href="LBC_Anthropic-Institute_Resume.pdf" target="_blank">resume</a>
    <a href="LBC_Anthropic-Institute_Recommendation.pdf" target="_blank">recommendation letter</a>
    <a href="LBC_Anthropic_Precis.pdf" target="_blank">précis</a>
    <a href="LBC_ArtCV.pdf" target="_blank">art cv</a>
  </div>

  <script>
    function changeBackground() {
      const hue = Math.floor(Math.random() * 360);
      const saturation = 30 + Math.random() * 70;
      const lightness = 10 + Math.random() * 40;
      const newColor = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
      document.documentElement.style.background = newColor;
      document.body.style.background = newColor;
      const nextTime = 1500 + Math.random() * 1500;
      setTimeout(changeBackground, nextTime);
    }
    changeBackground();
  </script>
</body>
</html>
